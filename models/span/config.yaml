# SPAN x4 (ch48), 128x128 tile. Single-image super-resolution, fully int8/BPU.
#
# The input is RGB in [0,1] handed straight to the BPU: input_type_train
# `featuremap` + `no_preprocess`, so the toolchain does no colour conversion and
# no normalisation. calib.py must therefore write tiles already in [0,1].
#
# 128 is the deliberate tile: the .hbm is mostly instruction stream and scales
# with input AREA, not weights -- the same net at 256x256 is ~148 MB against
# ~37 MB here, for identical per-pixel throughput. If the runtime tiles, compile
# the small tile.
model_parameters:
  onnx_model: "spanx4_ch48_128.onnx"
  march: "nash-m"
  output_model_file_prefix: "spanx4_ch48_nashm_128"
  working_dir: "./out"
input_parameters:
  input_name: "lr"
  input_shape: "1x3x128x128"
  input_type_train: "featuremap"
  input_type_rt: "featuremap"
  input_layout_train: "NCHW"
  norm_type: "no_preprocess"
calibration_parameters:
  cal_data_dir: "/ws/cal_npy_128"
  cal_data_type: "float32"
  calibration_type: "default"
compiler_parameters:
  optimize_level: "O2"
  compile_mode: "latency"
  jobs: 32
