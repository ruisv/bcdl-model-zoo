# ViTPose-S whole-body, 256x192, 133-keypoint heatmaps.
#
# NO global bit-width directive on purpose. This is a LayerNorm-heavy ViT, and
# LayerNorm is the operator int8 hurts most on the Nash BPU. Left to itself the
# compiler already promotes the LayerNorm-adjacent layers to int16 (same
# behaviour seen on this repo's PP-OCRv6 recogniser). Read `Output Data Type` in
# <prefix>_node_info.csv to see the split it chose; only add an `optimization`
# line to OVERRIDE that, after measuring on the board. Do not reflexively force
# set_all_nodes_int16.
#
# featuremap + no_preprocess: the ImageNet z-score is applied in calib.py and by
# the on-board preprocessor, NOT by the compiler. The graph takes an
# already-normalised tensor.
model_parameters:
  onnx_model: "vitpose_s_wholebody_static.onnx"
  march: "nash-m"                          # S100 / S100P. S600 has its own march.
  working_dir: "./out"
  output_model_file_prefix: "vitpose_s_wholebody_nashm_256x192"
input_parameters:
  input_name: "input_0"
  input_shape: "1x3x256x192"
  input_type_rt: "featuremap"
  input_type_train: "featuremap"
  input_layout_train: "NCHW"
  norm_type: "no_preprocess"
calibration_parameters:
  cal_data_dir: "/ws/cal_npy"              # compile.sh mounts this model dir at /ws
  calibration_type: "default"
compiler_parameters:
  optimize_level: "O2"
  compile_mode: "latency"
  jobs: 32                                 # NOT a CLI flag; hb_compile has no --jobs
