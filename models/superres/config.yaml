# Real-ESRGAN Compact x4, 128x128 tile. This is the shipped build.
#
# The tile size is the knob that matters: a compiled .hbm is mostly instruction
# stream and scales with input AREA, not weights. The same net at a 256 tile is
# ~148 MB against ~37 MB here, for identical per-pixel throughput. The on-board
# runtime already tiles the frame, so the small 128 tile is the right one. See
# README.md; the 256 build exists only to make that cost visible.
#
# The input is an arbitrary tensor (featuremap / no_preprocess): RGB CHW in
# [0,1], scaled by calib.py, so the compiler applies no normalisation.
model_parameters:
  onnx_model: "realesr_general_x4v3_128.onnx"
  march: "nash-m"
  working_dir: "./out_128"
  output_model_file_prefix: "realesr_general_x4v3_nashm_128"
input_parameters:
  input_name: "lr"
  input_shape: "1x3x128x128"
  input_type_rt: "featuremap"
  input_type_train: "featuremap"
  input_layout_train: "NCHW"
  norm_type: "no_preprocess"
calibration_parameters:
  cal_data_dir: "/ws/cal_128"
  cal_data_type: "float32"
  calibration_type: "default"
compiler_parameters:
  optimize_level: "O2"
  compile_mode: "latency"
  jobs: 32
