# Real-ESRGAN Compact x4, 256x256 tile. NOT the shipped build — it exists to
# make the cost of a larger tile visible, and to serve a runtime that cannot
# tile the frame itself.
#
# It is NOT more accurate than the 128 build: identical per-pixel quality. A
# compiled .hbm is mostly instruction stream and scales with input AREA, so 256
# is ~4x the pixels and roughly 4x the size (~148 MB vs the 128 tile's ~37 MB).
# If the runtime already tiles, compile the 128 tile (config.yaml).
model_parameters:
  onnx_model: "realesr_general_x4v3_256.onnx"
  march: "nash-m"
  working_dir: "./out_256"
  output_model_file_prefix: "realesr_general_x4v3_nashm_256"
input_parameters:
  input_name: "lr"
  input_shape: "1x3x256x256"
  input_type_rt: "featuremap"
  input_type_train: "featuremap"
  input_layout_train: "NCHW"
  norm_type: "no_preprocess"
calibration_parameters:
  cal_data_dir: "/ws/cal_256"
  cal_data_type: "float32"
  calibration_type: "default"
compiler_parameters:
  optimize_level: "O2"
  compile_mode: "latency"
  jobs: 32
