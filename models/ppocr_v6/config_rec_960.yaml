# PP-OCRv6 medium recognition, WIDE — 48x960 -> 120 timesteps x 18710 classes.
#
# The wide build for long lines. At 48x320 a line longer than 6.7:1 is truncated
# (a full sentence loses characters); 48x960 takes up to ~20:1. Cost: the .hbm is
# ~3x the area, and short lines waste most of the width on padding. Prefer the
# 320 build and split long lines upstream unless the workload is long-line-heavy.
#
# Pair the .hbm with ppocr_keys_v6_18710.txt. The tiny size is a DIFFERENT
# charset (6906) and mixing them decodes to confident nonsense.
#
# featuremap / no_preprocess matches PP-OCRv5 so the runtime's existing OCR
# preprocessing path works unchanged. The consequence is that the normalisation
# contract lives in calib.py rather than here -- see that file's docstring.
model_parameters:
  onnx_model: "ppocrv6_medium_rec_48x960.onnx"
  march: "nash-m"
  output_model_file_prefix: "ppocrv6_medium_rec_48x960"
  working_dir: "./out_rec_960"
input_parameters:
  input_name: "x"
  input_shape: "1x3x48x960"
  input_type_train: "featuremap"
  input_type_rt: "featuremap"
  input_layout_train: "NCHW"
  norm_type: "no_preprocess"
calibration_parameters:
  cal_data_dir: "/ws/cal_rec_960"
  calibration_type: "default"
compiler_parameters:
  optimize_level: "O2"
  compile_mode: "latency"
  jobs: 16
