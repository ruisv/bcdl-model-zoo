# OSNet-AIN int8 PTQ — THE REJECTED BUILD. Compiles cleanly and is wrong.
#
# This config exists to reproduce the failure, not to ship a model: int8 PTQ on
# this network drops Market-1501 Rank-1 to ~51% against the float ~85%, while
# every compile-time check stays green and the output cosine does not clearly
# flag it (a degraded embedding tower still emits plausible unit vectors). The
# shipped model is the QAT build — see deploy.py and README.md.
#
# featuremap / no_preprocess: the ImageNet normalization is baked into the
# calibration arrays by calib.py and into the runtime input by BCDL's
# ImageEmbedder. There is no mean/scale here to apply.
model_parameters:
  onnx_model: "osnet_ain_x1_0_256x128.onnx"
  march: "nash-m"
  working_dir: "./out_int8"
  output_model_file_prefix: "osnet_ain_int8_nashm_256x128"
input_parameters:
  input_name: "images"
  input_shape: "1x3x256x128"
  input_type_train: "featuremap"
  input_type_rt: "featuremap"
  input_layout_train: "NCHW"
  norm_type: "no_preprocess"
calibration_parameters:
  cal_data_dir: "/ws/cal_int8/images"
  calibration_type: "default"
compiler_parameters:
  optimize_level: "O2"
  compile_mode: "latency"
  jobs: 32
