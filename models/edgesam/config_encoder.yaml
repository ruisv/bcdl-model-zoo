# EdgeSAM image encoder (RepViT backbone, distilled from SAM), 1024x1024.
#
# Runs ONCE per image; the two decoders run per-prompt against its output. Input
# `raw_image` is a featuremap with `no_preprocess`: SAM's pixel mean/std are BAKED
# into the exported graph (see export.py), so the board feeds raw pixels and the
# graph normalises internally. Calibration data is therefore raw [0,255] pixels
# after SAM's resize-longest-side-to-1024 + pad letterbox (calib.py --part encoder).
#
# No `optimization` directive: let the compiler pick the bit width per layer.
# RepViT is a CNN (not a ViT), so it has none of the LayerNorm-precision concern a
# ViT encoder would; if a task check shows the embedding degrading, measure
# set_all_nodes_int16 on the board before hand-writing a mixed config.
model_parameters:
  onnx_model: "edge_sam_encoder_bpu.onnx"
  march: "nash-m"
  working_dir: "./enc_out"
  output_model_file_prefix: "edge_sam_encoder_nashm"
input_parameters:
  input_name: "raw_image"
  input_shape: "1x3x1024x1024"
  input_type_rt: "featuremap"
  input_type_train: "featuremap"
  input_layout_train: "NCHW"
  norm_type: "no_preprocess"
calibration_parameters:
  cal_data_dir: "/ws/enc_cal"
  cal_data_type: "float32"
  calibration_type: "default"
compiler_parameters:
  optimize_level: "O2"
  compile_mode: "latency"
  jobs: 32
