# XFeat sparse local features, 640x480. Single 1-channel `featuremap` input:
# the InstanceNorm was lifted out of the graph into CPU preprocessing (see
# export.py / calib.py), so the board feeds an ALREADY grayscale +
# instance-normalised tensor, hence `no_preprocess` and no mean/scale.
#
# No `optimization` directive: the compiler picks the bit width per layer
# (predominantly int8, promoting sensitive layers). Reconstructed from the
# shipped recipe, which likewise set none. If a task check shows the descriptor
# degrading, measure set_all_nodes_int16 on the board before hand-writing a
# mixed config -- see CONVERSION.md on why mixed precision is usually a trap.
#
# Consumes the slimmed graph; run onnxslim after export.py.
model_parameters:
  onnx_model: "xfeat_640x480_slim.onnx"
  march: "nash-m"
  output_model_file_prefix: "xfeat_nashm_640x480"
  working_dir: "./out"
input_parameters:
  input_name: "image"
  input_shape: "1x1x480x640"
  input_type_train: "featuremap"
  input_type_rt: "featuremap"
  input_layout_train: "NCHW"
  norm_type: "no_preprocess"
calibration_parameters:
  cal_data_dir: "/ws/cal_npy"
  cal_data_type: "float32"
  calibration_type: "default"
compiler_parameters:
  optimize_level: "O2"
  compile_mode: "latency"
  jobs: 32
